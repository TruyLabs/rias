<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard - Locked</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: { extend: { colors: { dark: { 900: '#0a0e14', 800: '#111820', 700: '#1a2130', 600: '#252d3a' } } } }
}
</script>
</head>
<body class="bg-dark-900 text-gray-200 min-h-screen flex items-center justify-center font-sans">
<main class="bg-dark-800 border border-dark-600 rounded-2xl p-10 w-80 text-center shadow-2xl" aria-label="Authentication">
  <div class="text-5xl mb-4" aria-hidden="true">&#128274;</div>
  <h1 class="text-lg font-bold mb-2">Dashboard Locked</h1>
  <p id="pin-hint" class="text-sm text-gray-500 mb-6">Enter PIN to continue</p>
  <label for="pin-input" class="sr-only" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0">PIN</label>
  <input id="pin-input" type="password" maxlength="10" autofocus inputmode="numeric" autocomplete="off"
    aria-describedby="pin-hint pin-error"
    class="w-full bg-dark-900 border border-dark-600 text-gray-200 px-4 py-3 rounded-lg font-mono text-2xl text-center tracking-[8px] outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-400/20">
  <div id="pin-error" role="alert" aria-live="assertive" class="text-red-500 text-xs mt-2 h-4"></div>
  <button id="unlock-btn"
    class="mt-4 w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors">
    Unlock
  </button>
</main>
<script>
const pin = document.getElementById('pin-input');
const btn = document.getElementById('unlock-btn');
const error = document.getElementById('pin-error');

async function submit() {
  error.textContent = '';
  pin.classList.remove('border-red-500','ring-2','ring-red-500/20');
  btn.disabled = true;
  btn.textContent = 'Unlocking…';
  try {
    const resp = await fetch('/api/auth', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({pin: pin.value})
    });
    if (resp.ok) {
      window.location.reload();
    } else {
      pin.classList.add('border-red-500','ring-2','ring-red-500/20');
      error.textContent = 'Invalid PIN';
      pin.value = '';
      pin.focus();
    }
  } catch {
    error.textContent = 'Connection error';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Unlock';
  }
}

btn.addEventListener('click', submit);
pin.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
</script>
</body>
</html>
