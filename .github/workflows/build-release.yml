name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: true
        type: string

# Prevent concurrent releases from racing.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ── Resolve version once ────────────────────────────────────────────────────
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate version format
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! echo "$VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: $VERSION (expected vX.Y.Z)"
            exit 1
          fi

  # ── Build binaries ──────────────────────────────────────────────────────────
  build:
    needs: get-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: kai-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: kai-darwin-arm64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: kai-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: kai-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.get-version.outputs.version }}
          COMMIT: ${{ github.sha }}
          CGO_ENABLED: "0"
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build \
            -trimpath \
            -ldflags "-X github.com/norenis/kai.Version=$VERSION \
                      -X github.com/norenis/kai.Commit=$COMMIT \
                      -X github.com/norenis/kai.BuildDate=$BUILD_DATE" \
            -o ${{ matrix.artifact }} \
            ./cmd/kai
          chmod +x ${{ matrix.artifact }}

      - name: Generate checksum
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  # ── Create GitHub Release + update Homebrew tap ─────────────────────────────
  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    outputs:
      darwin_arm64_sha256: ${{ steps.checksums.outputs.darwin_arm64 }}
      darwin_amd64_sha256:  ${{ steps.checksums.outputs.darwin_amd64 }}
      linux_amd64_sha256:   ${{ steps.checksums.outputs.linux_amd64 }}
      linux_arm64_sha256:   ${{ steps.checksums.outputs.linux_arm64 }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release files
        run: |
          mkdir -p release
          find dist -type f -name "kai-*" -exec cp {} release/ \;
          echo "Release contents:"
          ls -lah release/

      - name: Create tarballs for Homebrew
        run: |
          mkdir -p tarballs
          for platform in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64; do
            binary="release/kai-${platform}"
            if [ -f "$binary" ]; then
              cp "$binary" kai
              tar czf "tarballs/kai-${platform}.tar.gz" kai
              rm kai
            fi
          done

      - name: Compute tarball checksums
        id: checksums
        run: |
          sha256_for() {
            local file="tarballs/kai-${1}.tar.gz"
            [ -f "$file" ] && sha256sum "$file" | cut -d' ' -f1 || echo ""
          }
          echo "darwin_arm64=$(sha256_for darwin-arm64)" >> $GITHUB_OUTPUT
          echo "darwin_amd64=$(sha256_for darwin-amd64)"  >> $GITHUB_OUTPUT
          echo "linux_amd64=$(sha256_for linux-amd64)"    >> $GITHUB_OUTPUT
          echo "linux_arm64=$(sha256_for linux-arm64)"    >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@2.1.0  # v2.1.0
        with:
          tag_name: ${{ needs.get-version.outputs.version }}
          files: |
            release/*
            tarballs/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Installation

            ```bash
            brew tap norenis/kai
            brew install kai
            ```

            Or via the install script:

            ```bash
            curl -fsSL https://raw.githubusercontent.com/norenis/kai/main/install.sh | bash
            ```

            Or download a binary directly below for your platform.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Update Homebrew tap ─────────────────────────────────────────────────────
  update-homebrew-tap:
    needs: [get-version, release]
    runs-on: ubuntu-latest
    # Run on both tag pushes and manual workflow_dispatch releases.
    if: needs.release.result == 'success'

    steps:
      - name: Checkout main repo (for formula template)
        uses: actions/checkout@v4

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: norenis/homebrew-kai
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Generate formula from template
        env:
          VERSION_NUM: ${{ needs.get-version.outputs.version }}
          DARWIN_ARM64_SHA256: ${{ needs.release.outputs.darwin_arm64_sha256 }}
          DARWIN_AMD64_SHA256:  ${{ needs.release.outputs.darwin_amd64_sha256 }}
          LINUX_AMD64_SHA256:   ${{ needs.release.outputs.linux_amd64_sha256 }}
          LINUX_ARM64_SHA256:   ${{ needs.release.outputs.linux_arm64_sha256 }}
        run: |
          export VERSION_NUM="${VERSION_NUM#v}"  # Strip leading 'v'
          mkdir -p tap/Formula
          envsubst '$VERSION_NUM $DARWIN_ARM64_SHA256 $DARWIN_AMD64_SHA256 $LINUX_AMD64_SHA256 $LINUX_ARM64_SHA256' \
            < Formula/kai.rb.tpl \
            > tap/Formula/kai.rb

      - name: Commit and push formula
        run: |
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin HEAD
          git add Formula/kai.rb
          if git diff --staged --quiet; then
            echo "Formula unchanged — nothing to push"
            exit 0
          fi
          git commit -m "Update kai to ${{ needs.get-version.outputs.version }}"
          git push
